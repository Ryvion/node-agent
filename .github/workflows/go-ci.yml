name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Build agent
        run: go build -ldflags "-X main.version=${{ github.sha }}" ./cmd/ryvion-node

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race ./...

      - name: Govulncheck
        continue-on-error: true  # Go 1.24 stdlib has known vulns (GO-2026-4602, GO-2026-4601) not yet fixed
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
