name: Build and Release Ryvion Node

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.26.1'

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o ryvion-node${{ matrix.ext }} \
            ./cmd/ryvion-node

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        run: |
          tar -czf ryvion-node-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            ryvion-node${{ matrix.ext }}

      - name: Package (zip)
        if: matrix.goos == 'windows'
        run: |
          zip ryvion-node-${{ matrix.goos }}-${{ matrix.goarch }}.zip \
            ryvion-node${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryvion-node-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ryvion-node-${{ matrix.goos }}-${{ matrix.goarch }}.*

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ryvion-node-*
          merge-multiple: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate checksums
        run: |
          sha256sum ryvion-node-*/* > SHA256SUMS
          cat SHA256SUMS

      - name: Sign checksums
        env:
          RELEASE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "${RELEASE_SIGNING_PRIVATE_KEY_B64}" ]; then
            echo "::error::Missing RELEASE_SIGNING_PRIVATE_KEY_B64 secret"
            exit 1
          fi
          cat > /tmp/sign_checksums.go <<'EOF'
          package main

          import (
          	"crypto/ed25519"
          	"encoding/base64"
          	"fmt"
          	"os"
          	"strings"
          )

          func main() {
          	privB64 := strings.TrimSpace(os.Getenv("RELEASE_SIGNING_PRIVATE_KEY_B64"))
          	raw, err := base64.StdEncoding.DecodeString(privB64)
          	if err != nil {
          		fmt.Fprintln(os.Stderr, "decode private key:", err)
          		os.Exit(1)
          	}
          	if len(raw) != ed25519.PrivateKeySize {
          		fmt.Fprintf(os.Stderr, "invalid private key size: got %d want %d\n", len(raw), ed25519.PrivateKeySize)
          		os.Exit(1)
          	}
          	checksums, err := os.ReadFile("SHA256SUMS")
          	if err != nil {
          		fmt.Fprintln(os.Stderr, "read SHA256SUMS:", err)
          		os.Exit(1)
          	}
          	sig := ed25519.Sign(ed25519.PrivateKey(raw), checksums)
          	if err := os.WriteFile("SHA256SUMS.sig", []byte(base64.StdEncoding.EncodeToString(sig)+"\n"), 0644); err != nil {
          		fmt.Fprintln(os.Stderr, "write SHA256SUMS.sig:", err)
          		os.Exit(1)
          	}
          }
          EOF
          go run /tmp/sign_checksums.go
          cat SHA256SUMS.sig

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ryvion-node-*/*
            SHA256SUMS
            SHA256SUMS.sig
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
