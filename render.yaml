services:
  - type: web
    name: ryvion-node-agent
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: standard
    branch: main
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /health
    envVars:
      - key: AK_HUB_URL
        value: https://ryvion-hub.onrender.com
      - key: AK_DEVICE_TYPE
        value: gpu
      - key: AK_UI_PORT
        value: 3000
      - key: AK_LOG_LEVEL
        value: info
      - key: DOCKER_HOST
        value: unix:///var/run/docker.sock
    buildCommand: echo "Building with Docker"
    startCommand: |
      # Start Docker daemon in background
      dockerd-entrypoint.sh &
      sleep 5
      # Start the node agent with explicit URL
      /usr/local/bin/node-agent \
        -hub https://ryvion-hub.onrender.com \
        -type gpu \
        -ui-port 3000