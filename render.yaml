services:
  - type: web
    name: ryvion-node-agent
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: standard
    branch: main
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /health
    envVars:
      - key: AK_HUB_URL
        value: https://ryvion-hub.onrender.com
      - key: AK_DEVICE_TYPE
        value: cpu
      - key: AK_UI_PORT
        value: 3000
      - key: AK_LOG_LEVEL
        value: info
    buildCommand: echo "Building with Docker"