services:
  ryvion-node:
    image: ryvion/node-agent:latest
    container_name: ryvion-node-agent
    restart: unless-stopped
    privileged: true
    volumes:
      - node-keys:/root/.akatosh
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["-hub", "https://ryvion-hub.onrender.com", "-ui-port", "3000"]
    environment:
      - AK_HUB_URL=https://ryvion-hub.onrender.com
      - AK_UI_PORT=3000
      - AK_LOG_LEVEL=info
    ports:
      - "3000:3000"

volumes:
  node-keys:
    driver: local